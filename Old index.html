<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skrit Search Engine</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons via CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom Configuration & Animations -->
  <style>
    body { background-color: #0a0a0f; color: #e2e8f0; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    
    /* Hide scrollbars for cleaner look */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #374151; }
  </style>
</head>
<body class="min-h-screen selection:bg-cyan-500/30 flex flex-col font-sans">

  <!-- DYNAMIC HEADER (Hidden initially) -->
  <header id="header-view" class="hidden sticky top-0 z-10 bg-[#0a0a0f]/80 backdrop-blur-xl border-b border-white/10 p-4 md:px-8 flex items-center gap-4 md:gap-8 transition-all">
    <button onclick="handleReset()" class="text-slate-400 hover:text-white transition-colors cursor-pointer p-2 -ml-2" title="Back to home">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </button>
    
    <div onclick="handleReset()" class="text-2xl md:text-3xl font-bold tracking-tighter cursor-pointer flex-shrink-0">
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">Skrit</span>
    </div>

    <form onsubmit="handleSearch(event)" class="flex-1 max-w-2xl relative flex items-center">
      <input type="text" id="header-search-input" class="w-full bg-white/5 border border-white/10 rounded-full py-2.5 pl-4 pr-12 text-sm focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/50 transition-all text-white placeholder-slate-500" placeholder="Search the web..." />
      <button type="submit" class="absolute right-1.5 p-2 bg-cyan-500 hover:bg-cyan-400 text-black rounded-full transition-colors cursor-pointer">
        <i data-lucide="search" class="w-4 h-4"></i>
      </button>
    </form>
  </header>

  <main id="main-container" class="flex-1 flex flex-col w-full items-center justify-center p-4">
    
    <!-- HOMEPAGE VIEW -->
    <div id="home-view" class="w-full max-w-2xl flex flex-col items-center animate-fade-in duration-700">
      <div class="relative mb-12 select-none group">
        <div class="absolute -inset-4 bg-gradient-to-r from-cyan-500 to-purple-600 blur-2xl opacity-20 group-hover:opacity-40 transition-opacity duration-1000 rounded-full"></div>
        <h1 class="relative text-7xl md:text-8xl font-bold tracking-tighter">
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500">Skrit</span>
          <i data-lucide="sparkles" class="absolute -top-6 -right-8 w-8 h-8 text-cyan-400 animate-pulse"></i>
        </h1>
      </div>

      <form onsubmit="handleSearch(event)" class="w-full relative flex flex-col items-center gap-6">
        <div class="w-full relative group">
          <div class="absolute inset-0 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-full blur opacity-20 group-hover:opacity-30 transition-opacity duration-500"></div>
          <div class="relative flex items-center bg-[#13131a] border border-white/10 rounded-full px-2 py-2 hover:border-white/20 transition-colors focus-within:border-cyan-500/50 focus-within:ring-1 focus-within:ring-cyan-500/50">
            <i data-lucide="search" class="w-5 h-5 text-slate-500 ml-4"></i>
            <input type="text" id="home-search-input" class="flex-1 bg-transparent border-none outline-none text-lg px-4 py-2 text-white placeholder-slate-600" placeholder="Ask anything..." autofocus oninput="syncInputs(this.value)" />
            <button type="submit" id="home-search-btn" disabled class="bg-white/10 hover:bg-white/20 disabled:opacity-50 disabled:cursor-not-allowed text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all backdrop-blur-sm cursor-pointer">
              Search
            </button>
          </div>
        </div>

        <div class="flex gap-4 text-sm">
          <button type="button" onclick="quickSearch('Latest technology news')" class="px-4 py-2 rounded-full bg-white/5 hover:bg-white/10 border border-white/5 transition-colors cursor-pointer">Tech News</button>
          <button type="button" onclick="quickSearch('Space exploration')" class="px-4 py-2 rounded-full bg-white/5 hover:bg-white/10 border border-white/5 transition-colors cursor-pointer">Space</button>
          <button type="button" onclick="quickSearch('Artificial Intelligence')" class="px-4 py-2 rounded-full bg-white/5 hover:bg-white/10 border border-white/5 transition-colors cursor-pointer">AI Trends</button>
        </div>
      </form>
    </div>

    <!-- RESULTS VIEW (Hidden initially) -->
    <div id="results-view" class="hidden w-full flex-col gap-6 animate-fade-in mt-4 md:mt-0 max-w-4xl mx-auto">
      <div id="loading-state" class="hidden flex-col items-center justify-center py-20 text-slate-400 gap-4">
        <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-cyan-500"></i>
        <p>Searching the web...</p>
      </div>

      <div id="results-list" class="hidden flex-col gap-8">
        <p id="results-meta" class="text-sm text-slate-500"></p>
        <div id="results-container" class="flex flex-col gap-4"></div>
      </div>

      <div id="empty-state" class="hidden py-20 text-center">
        <p id="empty-message" class="text-xl text-slate-300 mb-2"></p>
        <p class="text-slate-500">Try adjusting your search terms or making them more general.</p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="w-full border-t border-white/5 bg-black/20 backdrop-blur-md mt-auto">
    <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 text-xs text-slate-500">
      <div class="flex items-center gap-1.5" id="copyright-year">
        <!-- Year inserted by JS -->
      </div>
      
      <div class="flex items-center gap-6">
        <span class="hover:text-slate-300 transition-colors cursor-default">Privacy</span>
        <span class="hover:text-slate-300 transition-colors cursor-default">Terms</span>
        <a href="mailto:tawanametatronnzombe@gmail.com?subject=Skrit%20Feedback" class="flex items-center gap-2 hover:text-cyan-400 transition-colors cursor-pointer bg-white/5 px-3 py-1.5 rounded-full">
          <i data-lucide="mail" class="w-3.5 h-3.5"></i>
          Send Feedback
        </a>
      </div>
    </div>
  </footer>

  <!-- JAVASCRIPT LOGIC -->
  <script>
    // Initialize Icons
    lucide.createIcons();

    // Set Copyright Year
    document.getElementById('copyright-year').innerText = `© ${new Date().getFullYear()} Metatron878 , Tawananyasha Nzombe`;

    // DOM Elements
    const homeView = document.getElementById('home-view');
    const headerView = document.getElementById('header-view');
    const resultsView = document.getElementById('results-view');
    const mainContainer = document.getElementById('main-container');
    
    const loadingState = document.getElementById('loading-state');
    const resultsList = document.getElementById('results-list');
    const resultsContainer = document.getElementById('results-container');
    const resultsMeta = document.getElementById('results-meta');
    
    const emptyState = document.getElementById('empty-state');
    const emptyMessage = document.getElementById('empty-message');

    const homeInput = document.getElementById('home-search-input');
    const headerInput = document.getElementById('header-search-input');
    const homeSearchBtn = document.getElementById('home-search-btn');

    let currentQuery = '';

    // Sync input fields and handle button state
    function syncInputs(val) {
      currentQuery = val;
      homeInput.value = val;
      headerInput.value = val;
      homeSearchBtn.disabled = !val.trim();
    }

    headerInput.addEventListener('input', (e) => syncInputs(e.target.value));

    // Handle Quick Search Buttons
    function quickSearch(query) {
      syncInputs(query);
      handleSearch();
    }

    // Main Search Logic
    async function handleSearch(e) {
      if (e) e.preventDefault();
      if (!currentQuery.trim()) return;

      // Switch UI to Searching State
      homeView.classList.add('hidden');
      headerView.classList.remove('hidden');
      resultsView.classList.remove('hidden');
      resultsView.classList.add('flex');
      mainContainer.classList.remove('items-center', 'justify-center');
      mainContainer.classList.add('max-w-4xl', 'mx-auto', 'md:p-8');

      // Show Loading State
      loadingState.classList.remove('hidden');
      loadingState.classList.add('flex');
      resultsList.classList.add('hidden');
      resultsList.classList.remove('flex');
      emptyState.classList.add('hidden');

      try {
        const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(currentQuery)}&utf8=&format=json&origin=*`);
        const data = await res.json();
        const results = data.query.search;

        loadingState.classList.add('hidden');
        loadingState.classList.remove('flex');

        if (results.length > 0) {
          resultsList.classList.remove('hidden');
          resultsList.classList.add('flex');
          resultsMeta.innerText = `Showing top results for "${currentQuery}"`;
          
          resultsContainer.innerHTML = results.map(result => `
            <div class="group flex flex-col gap-1.5 bg-white/[0.02] p-5 rounded-2xl border border-white/5 hover:border-cyan-500/30 transition-all hover:bg-white/[0.04]">
              <a href="https://en.wikipedia.org/?curid=${result.pageid}" target="_blank" rel="noopener noreferrer" class="text-xs text-slate-400 flex items-center gap-1.5 mb-1">
                en.wikipedia.org <i data-lucide="external-link" class="w-3 h-3 opacity-0 group-hover:opacity-100 transition-opacity"></i>
              </a>
              <a href="https://en.wikipedia.org/?curid=${result.pageid}" target="_blank" rel="noopener noreferrer" class="text-xl font-semibold text-cyan-400 hover:text-cyan-300 hover:underline decoration-cyan-400/50 underline-offset-4">
                ${result.title}
              </a>
              <p class="text-slate-300 text-sm leading-relaxed mt-1">${result.snippet}...</p>
            </div>
          `).join('');
          
          lucide.createIcons(); // Re-initialize icons inside dynamically added HTML
        } else {
          emptyState.classList.remove('hidden');
          emptyMessage.innerText = `No results found for "${currentQuery}"`;
        }
      } catch (error) {
        console.error('Search failed:', error);
        loadingState.classList.add('hidden');
      }
    }

    // Reset back to Homepage
    function handleReset() {
      syncInputs('');
      
      headerView.classList.add('hidden');
      resultsView.classList.add('hidden');
      resultsView.classList.remove('flex');
      homeView.classList.remove('hidden');
      
      mainContainer.classList.add('items-center', 'justify-center');
      mainContainer.classList.remove('max-w-4xl', 'mx-auto', 'md:p-8');
    }
  </script>
</body>
</html>
